server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: ai-interview-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/ai_interview?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-to-a-base64-encoded-32-byte-value}
    token-expire-hours: ${JWT_EXPIRE_HOURS:24}
    refresh-token-expire-days: ${REFRESH_TOKEN_EXPIRE_DAYS:14}
  interview:
    start-window-minutes: ${INTERVIEW_START_WINDOW_MINUTES:15}
  storage:
    root-directory: ${MEDIA_STORAGE_ROOT:./data/media}
    max-upload-bytes: ${MEDIA_MAX_UPLOAD_BYTES:104857600}
  ai-task:
    poll-interval-ms: ${AI_TASK_POLL_INTERVAL_MS:3000}
  deepseek:
    enabled: ${DEEPSEEK_ENABLED:true}
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
