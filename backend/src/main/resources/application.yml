spring:
  application:
    name: ai-interview-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_interview?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

ai:
  llm:
    api-key: ${LLM_API_KEY:your-api-key}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    model: ${LLM_MODEL:gpt-4o}
    timeout: ${LLM_TIMEOUT:30000}
    max-tokens: ${LLM_MAX_TOKENS:4096}
  evaluation:
    enabled: ${AI_EVALUATION_ENABLED:true}
    prompt-template-path: ${AI_PROMPT_TEMPLATE_PATH:classpath:prompts/}